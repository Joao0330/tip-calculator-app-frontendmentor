<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
		<link rel="stylesheet" href="./styles/main.css" />
		<script defer src="./index.js"></script>

		<title>Frontend Mentor | Tip calculator app</title>
	</head>
	<body>
		<header>
			<h1 class="sr-only">Splitter</h1>
			<img src="./images/logo.svg" alt="Bill Splitter app logo" class="logo" />
		</header>
		<main>
			<div class="container">
				<section class="calculator">
					<div class="calculator__bill">
						<div class="formInput">
							<div>
								<label for="bill">Bill</label>
								<span>Can't be zero</span>
							</div>
							<input type="number" id="bill" placeholder="0" />
						</div>

						<div class="calculator__bill-tipOptions">
							<h2>Select Tip %</h2>

							<ul>
								<li>
									<button class="tipButton" data-tip="0.05">5%</button>
								</li>
								<li>
									<button class="tipButton" data-tip="0.1">10%</button>
								</li>
								<li>
									<button class="tipButton" data-tip="0.15">15%</button>
								</li>
								<li>
									<button class="tipButton" data-tip="0.25">25%</button>
								</li>
								<li>
									<button class="tipButton" data-tip="0.5">50%</button>
								</li>
								<li>
									<input type="number" placeholder="Custom" id="customTip" />
								</li>
							</ul>
						</div>

						<div class="formInput">
							<div>
								<label for="billPeople">Number of People</label>
								<span>Can't be zero</span>
							</div>
							<input type="number" id="billPeople" placeholder="0" min="0" />
						</div>
					</div>

					<div class="resultsCard">
						<div class="resultsCard__top">
							<div>
								<div>
									<h3>Tip Amount</h3>
									<span>/ person</span>
								</div>

								<strong id="totalTipDisplay">$0.00</strong>
							</div>
							<div>
								<div>
									<h3>Total</h3>
									<span>/ person</span>
								</div>

								<strong id="totalPriceDisplay">$0.00</strong>
							</div>
						</div>
						<button type="button" class="resetButton" disabled>reset</button>
					</div>
				</section>
			</div>
		</main>

		<footer>
			<p>
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor </a>. Coded by
				<a href="#">João Rodrigues</a>.
			</p>
		</footer>
	</body>
</html>
