<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
		<link rel="stylesheet" href="./styles/main.css" />

		<title>Frontend Mentor | Tip calculator app</title>
	</head>
	<body>
		<header>
			<h1 class="sr-only">Splitter</h1>
			<img src="./images/logo.svg" alt="Bill Splitter app logo" class="logo" />
		</header>
		<main>
			<div class="container">
				<section class="calculator">
					<div class="calculator__bill">
						<div class="calculator__bill-priceInput">
							<label for="bill">Bill</label>
							<input type="number" id="bill" />
						</div>

						<div class="calculator__bill-tipOptions">
							<h2>Select Tip %</h2>

							<ul>
								<li>
									<button>5%</button>
								</li>
								<li>
									<button>10%</button>
								</li>
								<li>
									<button>15%</button>
								</li>
								<li>
									<button>25%</button>
								</li>
								<li>
									<button>50%</button>
								</li>
								<li>
									<button>Custom</button>
								</li>
							</ul>
						</div>

						<div class="calculator__bill-people">
							<label for="billPeople">Number of People</label>
							<input type="number" id="billPeople" />
						</div>
					</div>

					<div class="calculator__results">
						<div class="calculator__results-amount">
							<div>
								<h3>Tip Amount</h3>
								<span>/ person</span>
							</div>

							<strong>$0.00</strong>
						</div>
						<div class="calculator__results-total">
							<div>
								<h3>Total</h3>
								<span>/ person</span>
							</div>

							<strong>$0.00</strong>
						</div>
						<button type="button">reset</button>
					</div>
				</section>
			</div>
		</main>

		<footer>
			<p>
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor </a>. Coded by
				<a href="#">João Rodrigues</a>.
			</p>
		</footer>
	</body>
</html>
